<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>全世界只剩我会古法编程</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Serif SC', serif; overflow-x: hidden; }
        
        /* 翻页动画 */
        .page-container { position: relative; min-height: 100vh; }
        .page { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        .page-enter { transform: translateX(100%); opacity: 0; }
        .page-enter-active { transform: translateX(0); opacity: 1; }
        .page-exit { transform: translateX(-30%); opacity: 0.7; }
        .page-exit-left { transform: translateX(-100%); opacity: 0; }
        
        /* 封面效果 */
        .cover-gradient { background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); }
        .glow-text { text-shadow: 0 0 30px rgba(139, 92, 246, 0.6); }
        .stars { position: absolute; width: 100%; height: 100%; overflow: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        /* 阅读区域 */
        .reader-bg { background: #f5f5dc; }
        .reader-bg-dark { background: #1a1a2e; color: #e0e0e0; }
        .reader-bg-sepia { background: #f4ecd8; color: #5b4636; }
        
        .content-wrapper { 
            max-width: 800px; margin: 0 auto; padding: 20px;
            font-size: 18px; line-height: 1.8; 
        }
        @media (max-width: 640px) { .content-wrapper { font-size: 16px; padding: 16px; } }
        
        .chapter-content h1 { display: none; }
        .chapter-content h2 { 
            font-size: 1.3em; font-weight: 600; margin: 1.5em 0 0.8em; 
            color: inherit; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 0.3em;
        }
        .chapter-content p { margin-bottom: 1em; text-indent: 2em; }
        .chapter-content p:first-of-type { text-indent: 0; }
        
        /* 目录样式 */
        .toc-item { 
            padding: 12px 16px; border-bottom: 1px solid rgba(0,0,0,0.05);
            cursor: pointer; transition: all 0.2s;
        }
        .toc-item:hover { background: rgba(59, 130, 246, 0.1); }
        .toc-item.active { background: rgba(59, 130, 246, 0.15); border-left: 3px solid #3b82f6; }
        .toc-item .chapter-num { font-size: 0.85em; color: #6b7280; margin-right: 8px; }
        .toc-item .chapter-title { font-size: 0.95em; color: #1f2937; }
        
        /* 底部导航栏 */
        .bottom-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.1); z-index: 100;
        }
        .nav-btn { 
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 12px; color: #4b5563; transition: all 0.2s;
        }
        .nav-btn:active { background: rgba(0,0,0,0.05); }
        .nav-btn:disabled { color: #9ca3af; }
        
        /* 设置面板 */
        .settings-panel {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(100%);
            background: white; border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15); z-index: 90;
            width: 100%; max-width: 500px; padding: 20px;
            transition: transform 0.3s ease;
        }
        .settings-panel.open { transform: translateX(-50%) translateY(0); }
        
        /* 进度条 */
        .progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: #3b82f6; z-index: 200; transition: width 0.3s; }
        
        /* 点击区域（翻页） */
        .click-zone { position: fixed; top: 60px; bottom: 60px; z-index: 10; }
        .click-zone-left { left: 0; width: 30%; }
        .click-zone-right { right: 0; width: 30%; }
        .click-zone-center { left: 30%; right: 30%; }
        
        /* 加载动画 */
        .loading { 
            display: flex; align-items: center; justify-content: center; 
            min-height: 50vh; color: #6b7280;
        }
        .spinner { 
            width: 40px; height: 40px; border: 3px solid #e5e7eb; 
            border-top-color: #3b82f6; border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

        // 状态管理

            bgColor: 'light', // light, dark, sepia
            theme: 'default'

            const saved = localStorage.getItem('readerSettings');
            if (saved) settings = JSON.parse(saved);
            render();
        });

        // 渲染主函数
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = '';
            
            if (currentView === 'cover') {
                app.innerHTML = renderCover();
            } else if (currentView === 'toc') {
                app.innerHTML = renderTOC();
            } else if (currentView === 'reader') {
                app.innerHTML = renderReader();
                loadChapterContent(currentChapter);
            }
        }

        // 目录页

                        </div>
                        
                        <!-- 字号 -->

                            <div class="flex gap-2">
                                <button onclick="setFontSize(14)" class="flex-1 py-2 rounded-lg border ${settings.fontSize === 14 ? 'bg-blue-500 text-white border-blue-500' : 'bg-white text-gray-700'}">小</button>
                                <button onclick="setFontSize(16)" class="flex-1 py-2 rounded-lg border ${settings.fontSize === 16 ? 'bg-blue-500 text-white border-blue-500' : 'bg-white text-gray-700'}">中</button>
                                <button onclick="setFontSize(18)" class="flex-1 py-2 rounded-lg border ${settings.fontSize === 18 ? 'bg-blue-500 text-white border-blue-500' : 'bg-white text-gray-700'}">大</button>
                                <button onclick="setFontSize(20)" class="flex-1 py-2 rounded-lg border ${settings.fontSize === 20 ? 'bg-blue-500 text-white border-blue-500' : 'bg-white text-gray-700'}">特大</button>
                            </div>
                        </div>
                        
                        <!-- 背景 -->
                        <div>
                            <label class="text-sm text-gray-600 mb-2 block">背景颜色</label>
                            <div class="flex gap-3">
                                <button onclick="setBgColor('light')" class="w-12 h-12 rounded-full border-2 ${settings.bgColor === 'light' ? 'border-blue-500' : 'border-gray-200'}" style="background: #f5f5dc"></button>
                                <button onclick="setBgColor('sepia')" class="w-12 h-12 rounded-full border-2 ${settings.bgColor === 'sepia' ? 'border-blue-500' : 'border-gray-200'}" style="background: #f4ecd8"></button>
                                <button onclick="setBgColor('dark')" class="w-12 h-12 rounded-full border-2 ${settings.bgColor === 'dark' ? 'border-blue-500' : 'border-gray-200'}" style="background: #1a1a2e"></button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 加载章节内容
        async function loadChapterContent(num) {
            const chapter = chapters[num - 1];
            document.getElementById('reader-title').textContent = chapter.title;
            document.getElementById('progress-bar').style.width = `${(num / 80) * 100}%`;
            
            try {
                const response = await fetch(`novel/chapters/${chapter.file}`);
                const markdown = await response.text();
                const html = marked.parse(markdown);
                document.getElementById('chapter-content').innerHTML = html;
                localStorage.setItem('lastReadChapter', num);
                window.scrollTo(0, 0);
            } catch (error) {
                document.getElementById('chapter-content').innerHTML = `
                    <div class="text-center py-20 text-red-500">
                        <p>加载失败</p>
                        <p class="text-sm mt-2">${error.message}</p>
                    </div>
                `;
            }
        }

        // 导航函数
        function showCover() { currentView = 'cover'; render(); }
        function showTOC() { currentView = 'toc'; render(); }
        function startReading() {
            const last = localStorage.getItem('lastReadChapter');
            currentChapter = last ? parseInt(last) : 1;
            currentView = 'reader';
            render();
        }
        function loadChapter(num) {
            if (num < 1 || num > 80) return;
            currentChapter = num;
            currentView = 'reader';
            render();
        }
        function prevChapter() {
            if (currentChapter > 1) {
                currentChapter--;
                loadChapterContent(currentChapter);
                updateReaderUI();
            }
        }
        function nextChapter() {
            if (currentChapter < 80) {
                currentChapter++;
                loadChapterContent(currentChapter);
                updateReaderUI();
            }
        }
        function updateReaderUI() {
            document.querySelectorAll('.nav-btn')[0].disabled = currentChapter <= 1;
            document.querySelectorAll('.nav-btn')[2].disabled = currentChapter >= 80;
        }

        // 设置
        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('open');
        }
        function setFontSize(size) {
            settings.fontSize = size;
            localStorage.setItem('readerSettings', JSON.stringify(settings));
            document.getElementById('content-wrapper').style.fontSize = size + 'px';
            render(); // 重新渲染以更新按钮状态
            if (currentView === 'reader') loadChapterContent(currentChapter);
        }
        function setBgColor(color) {
            settings.bgColor = color;
            localStorage.setItem('readerSettings', JSON.stringify(settings));
            render();
            if (currentView === 'reader') loadChapterContent(currentChapter);
        }

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (currentView !== 'reader') return;
            if (e.key === 'ArrowLeft') prevChapter();
            if (e.key === 'ArrowRight' || e.key === ' ') nextChapter();
        });

        // 触摸滑动支持
        let touchStartX = 0;
        let touchEndX = 0;
        document.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
        document.addEventListener('touchend', (e) => {
            if (currentView !== 'reader') return;
            touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) nextChapter();
            if (touchEndX - touchStartX > 50) prevChapter();
        });
    </script>
</body>
</html>
