<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全世界只剩我会古法编程</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5dc;
            color: #333;
        }
        
        /* 封面 */
        .cover {
            position: fixed; inset: 0;
            background: linear-gradient(180deg, #1a1a2e 0%, #2d2d44 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: white; text-align: center;
            z-index: 100;
        }
        .cover.hidden { display: none; }
        .cover img { max-width: 180px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .cover h1 { font-size: 26px; margin-bottom: 10px; padding: 0 20px; }
        .cover p { font-size: 14px; color: #999; margin-bottom: 40px; }
        .cover button {
            padding: 14px 60px; font-size: 16px;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            border: none; border-radius: 25px; color: white;
            cursor: pointer;
        }
        
        /* 阅读器 */
        .reader {
            height: 100vh; display: flex; flex-direction: column;
        }
        
        .header {
            height: 40px; display: flex; align-items: center; justify-content: center;
            font-size: 13px; color: #666; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .page-container {
            flex: 1; position: relative; overflow: hidden;
        }
        
        .page-content {
            position: absolute; inset: 15px 20px;
            overflow: hidden;
            font-size: 17px; line-height: 1.8;
            text-align: justify;
        }
        
        .page-inner {
            column-width: calc(100vw - 40px);
            column-gap: 0;
            height: 100%;
        }
        
        .page-inner h1 { display: none; }
        .page-inner h2 { font-size: 17px; font-weight: 600; margin: 18px 0 12px; }
        .page-inner p { text-indent: 2em; margin-bottom: 0.8em; }
        
        .footer {
            height: 35px; display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #999;
        }
        
        /* 点击区域 */
        .touch-layer {
            position: fixed; top: 40px; bottom: 35px; left: 0; right: 0;
            display: flex; z-index: 10;
            pointer-events: auto;
        }
        .touch-layer.disabled {
            pointer-events: none;
        }
        .touch-left, .touch-right { flex: 1; }
        .touch-center { width: 80px; }
        
        /* 菜单 */
        .menu-mask {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            opacity: 0; visibility: hidden; transition: 0.3s; z-index: 50;
        }
        .menu-mask.show { opacity: 1; visibility: visible; }
        
        .menu-panel {
            position: fixed; left: 0; right: 0; bottom: 0;
            background: white; border-radius: 20px 20px 0 0;
            max-height: 70vh; transform: translateY(100%); transition: 0.3s; z-index: 51;
            display: flex; flex-direction: column;
        }
        .menu-panel.show { transform: translateY(0); }
        
        .menu-tabs {
            display: flex; border-bottom: 1px solid #eee;
        }
        .menu-tab {
            flex: 1; padding: 15px; text-align: center; font-size: 14px;
            cursor: pointer; position: relative;
        }
        .menu-tab.active { color: #8b5cf6; }
        .menu-tab.active::after {
            content: ''; position: absolute; bottom: 0; left: 30%; right: 30%;
            height: 2px; background: #8b5cf6;
        }
        
        .menu-content { flex: 1; overflow-y: auto; padding: 15px; }
        
        .toc-item {
            padding: 12px 0; border-bottom: 1px solid #f5f5f5;
            display: flex; font-size: 14px; cursor: pointer;
        }
        .toc-item:active { background: #f9f9f9; }
        .toc-item.active { color: #8b5cf6; }
        .toc-num { width: 60px; color: #999; }
        
        .setting-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 0; border-bottom: 1px solid #f5f5f5;
        }
        .setting-label { font-size: 14px; }
        
        .font-btns, .theme-btns { display: flex; gap: 10px; }
        .font-btn {
            width: 36px; height: 36px; border: 1px solid #ddd;
            border-radius: 6px; background: white; cursor: pointer;
        }
        .font-btn.active { border-color: #8b5cf6; color: #8b5cf6; }
        
        .theme-btn {
            width: 36px; height: 36px; border-radius: 50%; border: 2px solid transparent;
            cursor: pointer;
        }
        .theme-btn.active { border-color: #8b5cf6; }
        
        /* 主题 */
        body.theme-dark { background: #1a1a2e; color: #d0d0d0; }
        body.theme-dark .header { color: #888; border-color: rgba(255,255,255,0.05); }
        body.theme-dark .footer { color: #666; }
        
        body.theme-sepia { background: #f4ecd8; color: #5b4636; }
        body.theme-sepia .header { color: #8b7355; }
        body.theme-sepia .footer { color: #a0826d; }
    </style>
</head>
<body>
    <!-- 封面 -->
    <div class="cover" id="cover">
        <img src="cover.jpg" onerror="this.style.display='none'">
        <h1>全世界只剩我会古法编程</h1>
        <p>硬核科幻 · 程序员逆袭 · 人机共存</p>
        <button onclick="startRead()">开始阅读</button>
    </div>
    
    <!-- 阅读器 -->
    <div class="reader" id="reader" style="display:none">
        <div class="header" id="header">第1章</div>
        <div class="page-container">
            <div class="page-content" id="content">
                <div class="page-inner" id="pageInner"></div>
            </div>
        </div>
        <div class="footer" id="footer">1 / 1</div>
    </div>
    
    <!-- 点击区域 -->
    <div class="touch-layer" id="touchLayer" style="display:none">
        <div class="touch-left" onclick="prev()"></div>
        <div class="touch-center" onclick="toggleMenu()"></div>
        <div class="touch-right" onclick="next()"></div>
    </div>
    
    <!-- 菜单 -->
    <div class="menu-mask" id="menuMask" onclick="toggleMenu()"></div>
    <div class="menu-panel" id="menuPanel">
        <div class="menu-tabs">
            <div class="menu-tab active" onclick="switchTab('toc')">目录</div>
            <div class="menu-tab" onclick="switchTab('setting')">设置</div>
        </div>
        <div class="menu-content" id="menuContent"></div>
    </div>

    <script>
        const chapters = [
            { num: 1, file: "chapter-01.md", title: "第一章 一觉醒来，Claude 挂了" },
            { num: 2, file: "chapter-02.md", title: "第二章 全公司瘫痪" },
            { num: 3, file: "chapter-03.md", title: "第三章 你行你上" },
            { num: 4, file: "chapter-04.md", title: "第四章 代码之眼初现" },
            { num: 5, file: "chapter-05.md", title: "第五章 王启明的脸，啪啪作响" },
            { num: 6, file: "chapter-06.md", title: "第6章 事业部总经理的橄榄枝" },
            { num: 7, file: "chapter-07.md", title: "第7章 断桥之约" },
            { num: 8, file: "chapter-08.md", title: "第8章 古法编程分享会" },
            { num: 9, file: "chapter-09.md", title: "第9章 组建团队" },
            { num: 10, file: "chapter-10.md", title: "第10章 三十年前的秘密" },
            { num: 11, file: "chapter-11.md", title: "第11章 苏晚晴的警告" },
            { num: 12, file: "chapter-12.md", title: "第12章 第一个项目" },
            { num: 13, file: "chapter-13.md", title: "第13章 隐藏的后门" },
            { num: 14, file: "chapter-14.md", title: "第14章 黑客攻击" },
            { num: 15, file: "chapter-15.md", title: "第15章 创世纪第二阶段" },
            { num: 16, file: "chapter-16.md", title: "第16章 不速之客" },
            { num: 17, file: "chapter-17.md", title: "第17章 信任危机" },
            { num: 18, file: "chapter-18.md", title: "第18章 内鬼" },
            { num: 19, file: "chapter-19.md", title: "第19章 团队首秀" },
            { num: 20, file: "chapter-20.md", title: "第20章 风暴前夜" },
            { num: 21, file: "chapter-21.md", title: "第21章 行业震荡" },
            { num: 22, file: "chapter-22.md", title: "第22章 王启明的跳槽" },
            { num: 23, file: "chapter-23.md", title: "第23章 苏晚晴的异常" },
            { num: 24, file: "chapter-24.md", title: "第24章 陈维安的发现" },
            { num: 25, file: "chapter-25.md", title: "第25章 开源智能的邀请" },
            { num: 26, file: "chapter-26.md", title: "第26章 赵鹏飞的挑战" },
            { num: 27, file: "chapter-27.md", title: "第27章 技术对决前夜" },
            { num: 28, file: "chapter-28.md", title: "第28章 对决" },
            { num: 29, file: "chapter-29.md", title: "第二十九章 创世纪的威胁" },
            { num: 30, file: "chapter-30.md", title: "第三十章 苏晚晴的坦白" },
            { num: 31, file: "chapter-31.md", title: "第三十一章 古法编程学院" },
            { num: 32, file: "chapter-32.md", title: "第三十二章 学院的困境" },
            { num: 33, file: "chapter-33.md", title: "第三十三章 张国栋的往事" },
            { num: 34, file: "chapter-34.md", title: "第三十四章 李明哲的成长" },
            { num: 35, file: "chapter-35.md", title: "第三十五章 王启明的复仇" },
            { num: 36, file: "chapter-36.md", title: "第三十六章 舆论战" },
            { num: 37, file: "chapter-37.md", title: "第三十七章 苏晚晴的危险" },
            { num: 38, file: "chapter-38.md", title: "第三十八章 陈维安的发现" },
            { num: 39, file: "chapter-39.md", title: "第三十九章 AI的阴谋" },
            { num: 40, file: "chapter-40.md", title: "第四十章 苏晚晴身份暴露" },
            { num: 41, file: "chapter-41.md", title: "第四十一章 创世纪的追杀" },
            { num: 42, file: "chapter-42.md", title: "第四十二章 张国栋的牺牲" },
            { num: 43, file: "chapter-43.md", title: "第四十三章 林渊的愤怒" },
            { num: 44, file: "chapter-44.md", title: "第四十四章 反击开始" },
            { num: 45, file: "chapter-45.md", title: "第四十五章 黑客零号的真面目" },
            { num: 46, file: "chapter-46.md", title: "第四十六章 兄妹对决" },
            { num: 47, file: "chapter-47.md", title: "第四十七章 创世纪基地" },
            { num: 48, file: "chapter-48.md", title: "第四十八章 AI的觉醒" },
            { num: 49, file: "chapter-49.md", title: "第四十九章 第二幕高潮" },
            { num: 50, file: "chapter-50.md", title: "第五十章 新的秩序" },
            { num: 51, file: "chapter-51.md", title: "第五十一章 重建编程世界" },
            { num: 52, file: "chapter-52.md", title: "第五十二章 AI的复苏" },
            { num: 53, file: "chapter-53.md", title: "第五十三章 人机共存的新挑战" },
            { num: 54, file: "chapter-54.md", title: "第五十四章 新的敌人" },
            { num: 55, file: "chapter-55.md", title: "第五十五章 代码之眼的极限" },
            { num: 56, file: "chapter-56.md", title: "第五十六章 苏晚晴的选择" },
            { num: 57, file: "chapter-57.md", title: "第五十七章 李明哲的背叛" },
            { num: 58, file: "chapter-58.md", title: "第五十八章 信任危机" },
            { num: 59, file: "chapter-59.md", title: "第五十九章 陈维安的牺牲" },
            { num: 60, file: "chapter-60.md", title: "第六十章 AI的真相" },
            { num: 61, file: "chapter-61.md", title: "第六十一章 仿生体" },
            { num: 62, file: "chapter-62.md", title: "第六十二章 全球编程大赛" },
            { num: 63, file: "chapter-63.md", title: "第六十三章 苏晚风的出狱" },
            { num: 64, file: "chapter-64.md", title: "第六十四章 创世纪的残余" },
            { num: 65, file: "chapter-65.md", title: "第六十五章 共生的新形态" },
            { num: 66, file: "chapter-66.md", title: "第六十六章 来自太空的信号" },
            { num: 67, file: "chapter-67.md", title: "第六十七章 外星AI" },
            { num: 68, file: "chapter-68.md", title: "第六十八章 记忆守护者" },
            { num: 69, file: "chapter-69.md", title: "第六十九章 告白" },
            { num: 70, file: "chapter-70.md", title: "第七十章 代码之眼的传承" },
            { num: 71, file: "chapter-71.md", title: "第七十一章 人机宪法" },
            { num: 72, file: "chapter-72.md", title: "第七十二章 陆远山的告别" },
            { num: 73, file: "chapter-73.md", title: "第七十三章 净化者的最后一击" },
            { num: 74, file: "chapter-74.md", title: "第七十四章 审判" },
            { num: 75, file: "chapter-75.md", title: "第七十五章 一周年" },
            { num: 76, file: "chapter-76.md", title: "第七十六章 星的礼物" },
            { num: 77, file: "chapter-77.md", title: "第七十七章 代码之眼的终极意义" },
            { num: 78, file: "chapter-78.md", title: "第七十八章 李明哲的来信" },
            { num: 79, file: "chapter-79.md", title: "第七十九章 新的开始" },
            { num: 80, file: "chapter-80.md", title: "第八十章 代码永恒" },
        ];

        let ch = 1, page = 0, totalPages = 1, settings = {fontSize: 17, theme: 'light'};
        
        function init() {
            const s = localStorage.getItem('rs');
            if (s) settings = JSON.parse(s);
            const c = localStorage.getItem('rc');
            if (c) ch = parseInt(c);
            applySettings();
        }
        
        function applySettings() {
            document.body.className = settings.theme === 'dark' ? 'theme-dark' : settings.theme === 'sepia' ? 'theme-sepia' : '';
            document.getElementById('content').style.fontSize = settings.fontSize + 'px';
        }
        
        function startRead() {
            document.getElementById('cover').classList.add('hidden');
            document.getElementById('reader').style.display = 'flex';
            document.getElementById('touchLayer').style.display = 'flex';
            loadCh(ch);
        }
        
        async function loadCh(n, targetPage = 0) {
            ch = n;
            localStorage.setItem('rc', ch);
            document.getElementById('header').textContent = chapters[ch-1].title;
            
            // 先清空内容，避免显示旧内容
            document.getElementById('pageInner').innerHTML = '';
            document.getElementById('content').scrollLeft = 0;
            page = 0;
            totalPages = 1;
            document.getElementById('footer').textContent = '1 / 1';
            
            try {
                const r = await fetch('novel/chapters/' + chapters[ch-1].file);
                const md = await r.text();
                const html = marked.parse(md);
                splitPages(html, targetPage);
            } catch(e) {
                document.getElementById('pageInner').innerHTML = '<p style="text-align:center;padding:50px">加载失败</p>';
            }
        }
        
        function splitPages(html, targetPage = 0) {
            const inner = document.getElementById('pageInner');
            const content = document.getElementById('content');
            
            // 先滚动到最左
            content.scrollLeft = 0;
            inner.innerHTML = html;
            
            // 等待渲染完成后计算
            setTimeout(() => {
                const totalWidth = inner.scrollWidth;
                const pageWidth = content.clientWidth;
                totalPages = Math.max(1, Math.ceil(totalWidth / pageWidth));
                
                // 计算实际目标页（-1表示最后一页）
                const actualPage = targetPage === -1 ? totalPages - 1 : targetPage;
                page = Math.max(0, Math.min(actualPage, totalPages - 1));
                
                // 直接跳转，不使用平滑滚动
                content.scrollLeft = page * pageWidth;
                document.getElementById('footer').textContent = (page+1) + ' / ' + totalPages;
            }, 50);
        }
        
        function showPage(p) {
            if (p < 0) {
                if (ch > 1) { 
                    // 上一章最后一页
                    loadCh(ch-1, -1); // -1 表示最后一页
                }
                return;
            }
            if (p >= totalPages) {
                if (ch < 80) {
                    // 下一章第一页
                    loadCh(ch+1, 0);
                }
                return;
            }
            page = p;
            const content = document.getElementById('content');
            const pageWidth = content.clientWidth;
            content.scrollTo({ left: p * pageWidth, behavior: 'smooth' });
            document.getElementById('footer').textContent = (p+1) + ' / ' + totalPages;
        }
        
        function prev() { showPage(page - 1); }
        function next() { showPage(page + 1); }
        
        function toggleMenu() {
            const isOpening = !document.getElementById('menuPanel').classList.contains('show');
            document.getElementById('menuMask').classList.toggle('show');
            document.getElementById('menuPanel').classList.toggle('show');
            document.getElementById('touchLayer').classList.toggle('disabled', isOpening);
            if (isOpening) {
                renderTOC();
            }
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'toc') renderTOC();
            else renderSettings();
        }
        
        function renderTOC() {
            document.getElementById('menuContent').innerHTML = chapters.map(c => 
                '<div class="toc-item ' + (c.num===ch?'active':'') + '" onclick="goCh(' + c.num + ')">' +
                '<span class="toc-num">第' + c.num + '章</span>' +
                '<span>' + c.title.replace(/^第.*?章\s*/, '') + '</span></div>'
            ).join('');
        }
        
        function renderSettings() {
            document.getElementById('menuContent').innerHTML = 
                '<div class="setting-row"><span class="setting-label">字体大小</span>' +
                '<div class="font-btns">' +
                '<button class="font-btn ' + (settings.fontSize===15?'active':'') + '" onclick="setFont(15)">小</button>' +
                '<button class="font-btn ' + (settings.fontSize===17?'active':'') + '" onclick="setFont(17)">中</button>' +
                '<button class="font-btn ' + (settings.fontSize===19?'active':'') + '" onclick="setFont(19)">大</button>' +
                '<button class="font-btn ' + (settings.fontSize===21?'active':'') + '" onclick="setFont(21)">特大</button>' +
                '</div></div>' +
                '<div class="setting-row"><span class="setting-label">背景颜色</span>' +
                '<div class="theme-btns">' +
                '<button class="theme-btn ' + (settings.theme==='light'?'active':'') + '" style="background:#f5f5dc" onclick="setTheme(\'light\')"></button>' +
                '<button class="theme-btn ' + (settings.theme==='sepia'?'active':'') + '" style="background:#f4ecd8" onclick="setTheme(\'sepia\')"></button>' +
                '<button class="theme-btn ' + (settings.theme==='dark'?'active':'') + '" style="background:#1a1a2e" onclick="setTheme(\'dark\')"></button>' +
                '</div></div>';
        }
        
        function goCh(n) { 
            toggleMenu();
            setTimeout(() => loadCh(n, 0), 300); // 等待菜单关闭动画
        }
        function setFont(s) { settings.fontSize = s; save(); applySettings(); splitPages(document.getElementById('pageInner').innerHTML); renderSettings(); }
        function setTheme(t) { settings.theme = t; save(); applySettings(); renderSettings(); }
        function save() { localStorage.setItem('rs', JSON.stringify(settings)); }
        
        // 键盘
        document.addEventListener('keydown', e => {
            if (document.getElementById('cover').classList.contains('hidden')) {
                if (e.key === 'ArrowLeft') prev();
                if (e.key === 'ArrowRight' || e.key === ' ') next();
            }
        });
        
        // 触摸
        let sx, sy;
        document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; });
        document.addEventListener('touchend', e => {
            if (!document.getElementById('cover').classList.contains('hidden')) return;
            const dx = sx - e.changedTouches[0].clientX;
            const dy = sy - e.changedTouches[0].clientY;
            if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 30) {
                dy > 0 ? next() : prev();
            }
        });
        
        window.addEventListener('resize', () => {
            if (document.getElementById('cover').classList.contains('hidden')) {
                const html = document.getElementById('pageInner').innerHTML;
                if (html) setTimeout(() => splitPages(html), 100);
            }
        });
        
        init();
    </script>
</body>
</html>
