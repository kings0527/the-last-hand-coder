<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全世界只剩我会古法编程</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        
        /* 主题色 */
        :root {
            --bg-color: #f5f5dc;
            --text-color: #333;
            --text-secondary: #666;
        }
        
        body { background: var(--bg-color); color: var(--text-color); }
        
        /* 页面结构 */
        .reader {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
        }
        
        /* 顶部标题栏 */
        .header {
            height: 44px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 15px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 14px;
            color: var(--text-secondary);
            transition: opacity 0.3s;
        }
        
        .header.hidden { opacity: 0; pointer-events: none; }
        
        /* 阅读区域 */
        .content-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        .content-scroller {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            padding: 0 20px;
        }
        
        .content-inner {
            column-width: 100vw;
            column-gap: 0;
            height: 100%;
            font-size: 18px;
            line-height: 1.8;
            text-align: justify;
        }
        
        .content-inner h1 { 
            font-size: 22px; font-weight: 600; 
            margin-bottom: 20px; text-align: center;
        }
        .content-inner h2 { 
            font-size: 18px; font-weight: 600; 
            margin: 20px 0 15px;
        }
        .content-inner p { 
            margin-bottom: 1em; text-indent: 2em;
        }
        
        /* 点击区域 - 不可见 */
        .touch-layer {
            position: fixed; inset: 44px 0 0 0;
            display: flex;
            z-index: 10;
        }
        
        .touch-left, .touch-right {
            flex: 1;
            cursor: pointer;
        }
        
        .touch-center {
            width: 60px;
            cursor: pointer;
        }
        
        /* 底部进度 */
        .footer {
            height: 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            color: var(--text-secondary);
            transition: opacity 0.3s;
        }
        
        .footer.hidden { opacity: 0; }
        
        /* 菜单面板 */
        .menu-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0; visibility: hidden;
            transition: all 0.3s;
            z-index: 100;
        }
        
        .menu-overlay.show { opacity: 1; visibility: visible; }
        
        .menu-panel {
            position: fixed; left: 0; right: 0; bottom: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 101;
            max-height: 70vh;
            display: flex; flex-direction: column;
        }
        
        .menu-overlay.show + .menu-panel,
        .menu-panel.show { transform: translateY(0); }
        
        .menu-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .toc-list {
            flex: 1; overflow-y: auto;
            margin: 0 -20px; padding: 0 20px;
        }
        
        .toc-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex; align-items: center;
        }
        
        .toc-item:active { background: #f5f5f5; }
        .toc-item.active { color: #8b5cf6; }
        .toc-num { width: 50px; font-size: 13px; color: #999; }
        .toc-title { flex: 1; font-size: 15px; }
        
        /* 设置项 */
        .setting-row {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .font-size-btns {
            display: flex; gap: 10px;
        }
        
        .font-btn {
            width: 40px; height: 40px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        
        .font-btn.active {
            border-color: #8b5cf6;
            color: #8b5cf6;
        }
        
        .color-btns {
            display: flex; gap: 15px;
        }
        
        .color-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
        }
        
        .color-btn.active { border-color: #8b5cf6; }
        
        /* 加载 */
        .loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-color);
            z-index: 1000;
        }
        
        .loading.hide { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #ddd;
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 封面 */
        .cover {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px 30px;
            text-align: center;
            color: white;
            z-index: 200;
        }
        
        .cover.hide { opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        
        .cover-img {
            max-width: 200px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            margin-bottom: 30px;
        }
        
        .cover-title {
            font-size: 24px; font-weight: 700;
            margin-bottom: 10px;
        }
        
        .cover-desc {
            font-size: 14px; color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
            max-width: 300px;
        }
        
        .cover-btn {
            padding: 12px 50px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        
        /* 主题 */
        body.theme-dark {
            --bg-color: #1a1a2e;
            --text-color: #e0e0e0;
            --text-secondary: #888;
        }
        
        body.theme-sepia {
            --bg-color: #f4ecd8;
            --text-color: #5b4636;
            --text-secondary: #8b7355;
        }
    </style>
</head>
<body>
    <!-- 加载 -->
    <div class="loading" id="loading"><div class="spinner"></div></div>
    
    <!-- 封面 -->
    <div class="cover" id="cover">
        <img src="cover.jpg" class="cover-img" onerror="this.style.display='none'">
        <h1 class="cover-title">全世界只剩我会古法编程</h1>
        <p class="cover-desc">硬核科幻 · 程序员逆袭 · 人机共存</p>
        <button class="cover-btn" onclick="startRead()">开始阅读</button>
    </div>
    
    <!-- 阅读器 -->
    <div class="reader" id="reader">
        <div class="header" id="header">第1章</div>
        <div class="content-wrapper">
            <div class="content-scroller">
                <div class="content-inner" id="content"></div>
            </div>
        </div>
        <div class="footer" id="footer">1 / 1</div>
    </div>
    
    <!-- 点击层 -->
    <div class="touch-layer" id="touchLayer">
        <div class="touch-left" onclick="prevPage()"></div>
        <div class="touch-center" onclick="toggleMenu()"></div>
        <div class="touch-right" onclick="nextPage()"></div>
    </div>
    
    <!-- 菜单 -->
    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <div class="menu-panel" id="menuPanel">
        <div class="menu-header">
            <span style="font-weight:600">目录</span>
            <button onclick="toggleMenu()" style="border:none;background:none;font-size:20px">✕</button>
        </div>
        <div class="toc-list" id="tocList"></div>
    </div>

            { num: 38, file: "chapter-38.md", title: "第三十八章 陈维安的发现" },
            { num: 39, file: "chapter-39.md", title: "第三十九章 AI的阴谋" },

            { num: 49, file: "chapter-49.md", title: "第四十九章 第二幕高潮" },
            { num: 50, file: "chapter-50.md", title: "第五十章 新的秩序" },
            { num: 51, file: "chapter-51.md", title: "第五十一章 重建编程世界" },
            { num: 52, file: "chapter-52.md", title: "第五十二章 AI的复苏" },
            { num: 53, file: "chapter-53.md", title: "第五十三章 人机共存的新挑战" },

            { num: 57, file: "chapter-57.md", title: "第五十七章 李明哲的背叛" },

            { num: 60, file: "chapter-60.md", title: "第六十章 AI的真相" },

            { num: 62, file: "chapter-62.md", title: "第六十二章 全球编程大赛" },
            { num: 63, file: "chapter-63.md", title: "第六十三章 苏晚风的出狱" },
            { num: 64, file: "chapter-64.md", title: "第六十四章 创世纪的残余" },
            { num: 65, file: "chapter-65.md", title: "第六十五章 共生的新形态" },
            { num: 66, file: "chapter-66.md", title: "第六十六章 来自太空的信号" },
            { num: 67, file: "chapter-67.md", title: "第六十七章 外星AI" },
            { num: 68, file: "chapter-68.md", title: "第六十八章 记忆守护者" },
            { num: 69, file: "chapter-69.md", title: "第六十九章 告白" },
            { num: 70, file: "chapter-70.md", title: "第七十章 代码之眼的传承" },
            { num: 71, file: "chapter-71.md", title: "第七十一章 人机宪法" },
            { num: 72, file: "chapter-72.md", title: "第七十二章 陆远山的告别" },
            { num: 73, file: "chapter-73.md", title: "第七十三章 净化者的最后一击" },
            { num: 74, file: "chapter-74.md", title: "第七十四章 审判" },
            { num: 75, file: "chapter-75.md", title: "第七十五章 一周年" },
            { num: 76, file: "chapter-76.md", title: "第七十六章 星的礼物" },
            { num: 77, file: "chapter-77.md", title: "第七十七章 代码之眼的终极意义" },
            { num: 78, file: "chapter-78.md", title: "第七十八章 李明哲的来信" },
            { num: 79, file: "chapter-79.md", title: "第七十九章 新的开始" },
            { num: 80, file: "chapter-80.md", title: "第八十章 代码永恒" },
        ];

        // 状态
        let currentChapter = 1;
        let currentPage = 0;
        let totalPages = 1;
        let settings = { fontSize: 18, theme: 'light' };
        let contentHeight = 0;
        let pageHeight = 0;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('readerConfig');
            if (saved) settings = JSON.parse(saved);
            
            const last = localStorage.getItem('lastChapter');
            if (last) currentChapter = parseInt(last);
            
            applyTheme();
            initTOC();
            
            // 预加载当前章节
            loadChapter(currentChapter, false);
        });
        
        // 应用主题
        function applyTheme() {
            document.body.className = '';
            if (settings.theme === 'dark') document.body.classList.add('theme-dark');
            if (settings.theme === 'sepia') document.body.classList.add('theme-sepia');
            
            const content = document.getElementById('content');
            content.style.fontSize = settings.fontSize + 'px';
        }
        
        // 初始化目录
        function initTOC() {
            const list = document.getElementById('tocList');
            list.innerHTML = chapters.map(ch => `
                <div class="toc-item ${ch.num === currentChapter ? 'active' : ''}" onclick="goChapter(${ch.num})">
                    <span class="toc-num">第${ch.num}章</span>
                    <span class="toc-title">${ch.title.replace(/^第.*?章\s*/, '')}</span>
                </div>
            `).join('');
        }
        
        // 开始阅读
        function startRead() {
            document.getElementById('cover').classList.add('hide');
            document.getElementById('touchLayer').style.display = 'flex';
            setTimeout(calcPages, 100);
        }
        
        // 加载章节
        async function loadChapter(num, showLoading = true) {
            if (showLoading) document.getElementById('loading').classList.remove('hide');
            
            const ch = chapters[num - 1];
            try {
                const res = await fetch(`novel/chapters/${ch.file}`);
                const md = await res.text();
                const html = marked.parse(md);
                
                document.getElementById('content').innerHTML = `
                    <h1>${ch.title}</h1>
                    ${html}
                `;
                
                document.getElementById('header').textContent = ch.title;
                currentChapter = num;
                currentPage = 0;
                
                localStorage.setItem('lastChapter', num);
                initTOC();
                
                setTimeout(() => {
                    calcPages();
                    document.getElementById('loading').classList.add('hide');
                }, 100);
                
            } catch (e) {
                document.getElementById('content').innerHTML = '<p style="text-align:center;padding:50px">加载失败</p>';
                document.getElementById('loading').classList.add('hide');
            }
        }
        
        // 计算分页
        function calcPages() {
            const scroller = document.querySelector('.content-scroller');
            const inner = document.getElementById('content');
            
            pageHeight = scroller.clientHeight;
            contentHeight = inner.scrollHeight;
            totalPages = Math.ceil(contentHeight / pageHeight);
            if (totalPages < 1) totalPages = 1;
            
            goToPage(currentPage);
        }
        
        // 跳转到页
        function goToPage(page) {
            if (page < 0) page = 0;
            if (page >= totalPages) page = totalPages - 1;
            
            currentPage = page;
            const inner = document.getElementById('content');
            inner.style.transform = `translateY(-${page * pageHeight}px)`;
            inner.style.transition = 'transform 0.3s ease';
            
            document.getElementById('footer').textContent = `${page + 1} / ${totalPages}`;
            
            // 检查是否最后一页且还有下一章
            if (page === totalPages - 1 && currentChapter < 80) {
                // 预加载下一章
                preloadChapter(currentChapter + 1);
            }
        }
        
        // 预加载
        function preloadChapter(num) {
            const ch = chapters[num - 1];
            fetch(`novel/chapters/${ch.file}`).catch(() => {});
        }
        
        // 翻页
        function nextPage() {
            if (currentPage < totalPages - 1) {
                goToPage(currentPage + 1);
            } else if (currentChapter < 80) {
                // 下一章
                loadChapter(currentChapter + 1);
            }
        }
        
        function prevPage() {
            if (currentPage > 0) {
                goToPage(currentPage - 1);
            } else if (currentChapter > 1) {
                // 上一章最后一页
                loadChapter(currentChapter - 1, false);
                setTimeout(() => goToPage(totalPages - 1), 200);
            }
        }
        
        // 菜单
        function toggleMenu() {
            document.getElementById('menuOverlay').classList.toggle('show');
            document.getElementById('menuPanel').classList.toggle('show');
        }
        
        // 跳转章节
        function goChapter(num) {
            toggleMenu();
            loadChapter(num);
        }
        
        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('cover').classList.contains('hide')) {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') nextPage();
            }
        });
        
        // 触摸支持
        let touchStartY = 0;
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            touchStartX = e.touches[0].clientX;
        });
        document.addEventListener('touchend', (e) => {
            if (!document.getElementById('cover').classList.contains('hide')) return;
            
            const dy = touchStartY - e.changedTouches[0].clientY;
            const dx = touchStartX - e.changedTouches[0].clientX;
            
            // 垂直滑动翻页
            if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 50) {
                if (dy > 0) nextPage();
                else prevPage();
            }
        });
        
        // 窗口变化重新计算
        window.addEventListener('resize', () => {
            if (document.getElementById('cover').classList.contains('hide')) {
                setTimeout(calcPages, 100);
            }
        });
