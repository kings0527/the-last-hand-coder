<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Noto Serif SC', serif; background: #1a1a2e; }
        
        /* 书架背景 */
        .bookshelf-bg {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 50%, #1a1a2e 100%);
            display: flex; align-items: center; justify-content: center;
        }
        
        /* 书籍容器 */
        .book-container {
            position: relative;
            width: 90vw; max-width: 900px;
            height: 85vh; max-height: 700px;
            perspective: 2000px;
        }
        
        /* 书页 */
        .page {
            position: absolute; inset: 0;
            background: #faf8f3;
            border-radius: 4px;
            box-shadow: 
                0 0 20px rgba(0,0,0,0.3),
                inset 30px 0 40px -30px rgba(0,0,0,0.1),
                inset -30px 0 40px -30px rgba(0,0,0,0.1);
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-origin: left center;
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        
        .page.flipped {
            transform: rotateY(-180deg);
        }
        
        /* 书页正面和背面 */
        .page-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            background: #faf8f3;
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        
        .page-back {
            transform: rotateY(180deg);
            background: #f5f2e8;
        }
        
        /* 书脊效果 */
        .page::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0; width: 40px;
            background: linear-gradient(to right, 
                rgba(0,0,0,0.1) 0%,
                rgba(0,0,0,0.05) 20%,
                transparent 100%);
            z-index: 10; pointer-events: none;
        }
        
        .page.flipped::after {
            content: '';
            position: absolute; right: 0; top: 0; bottom: 0; width: 40px;
            background: linear-gradient(to left, 
                rgba(0,0,0,0.1) 0%,
                rgba(0,0,0,0.05) 20%,
                transparent 100%);
            z-index: 10; pointer-events: none;
        }
        
        /* 页面内容 */
        .page-header {
            padding: 20px 40px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .page-title {
            font-size: 14px; color: #666;
            letter-spacing: 2px;
        }
        
        .page-content {
            flex: 1;
            padding: 30px 50px;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.9;
            color: #333;
        }
        
        .page-content h1 { display: none; }
        .page-content h2 {
            font-size: 1.2em; font-weight: 600;
            margin: 1.5em 0 0.8em;
            color: #2d2d2d;
        }
        .page-content p {
            margin-bottom: 1em;
            text-indent: 2em;
            text-align: justify;
        }
        
        .page-number {
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
        
        /* 翻页提示区 */
        .page-zone {
            position: absolute;
            top: 60px; bottom: 60px;
            width: 35%;
            cursor: pointer;
            z-index: 100;
            transition: background 0.2s;
        }
        
        .page-zone:hover {
            background: rgba(59, 130, 246, 0.03);
        }
        
        .page-zone-left { left: 0; }
        .page-zone-right { right: 0; }
        
        .page-zone-center {
            left: 35%; right: 35%;
            cursor: default;
        }
        
        /* 翻页箭头提示 */
        .page-hint {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .page-zone-left:hover .page-hint,
        .page-zone-right:hover .page-hint {
            opacity: 0.6;
        }
        
        .page-hint-left { left: 20px; }
        .page-hint-right { right: 20px; }
        
        /* 封面页 */
        .cover-page {
            position: absolute; inset: 0;
            background: linear-gradient(145deg, #2d1b4e 0%, #1a1a2e 100%);
            border-radius: 4px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        
        .cover-page .book-title {
            font-size: 2rem; font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 20px rgba(139, 92, 246, 0.5);
        }
        
        .cover-page .book-subtitle {
            font-size: 1rem; color: #a78bfa;
            margin-bottom: 30px;
        }
        
        .cover-page .book-cover-img {
            max-width: 200px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            margin-bottom: 30px;
        }
        
        .cover-page .book-desc {
            max-width: 400px;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #e0e0e0;
            margin-bottom: 30px;
        }
        
        .cover-page .start-btn {
            padding: 12px 40px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .cover-page .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }
        
        /* 目录页 */
        .toc-page {
            position: absolute; inset: 0;
            background: #faf8f3;
            border-radius: 4px;
            display: flex; flex-direction: column;
        }
        
        .toc-header {
            padding: 25px 30px;
            border-bottom: 2px solid #8b5cf6;
            display: flex; align-items: center; gap: 15px;
        }
        
        .toc-header h2 {
            font-size: 1.3rem; color: #333;
        }
        
        .toc-back-btn {
            width: 36px; height: 36px;
            border: none; background: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        
        .toc-back-btn:hover { background: #e0e0e0; }
        
        .toc-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
        }
        
        .toc-item {
            display: flex; align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
        }
        
        .toc-item:hover {
            background: rgba(139, 92, 246, 0.08);
        }
        
        .toc-item.active {
            background: rgba(139, 92, 246, 0.15);
        }
        
        .toc-num {
            width: 45px;
            font-size: 0.85rem; color: #8b5cf6;
            font-weight: 600;
        }
        
        .toc-title {
            flex: 1;
            font-size: 0.95rem; color: #333;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        /* 进度条 */
        .progress-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 3px;
            background: rgba(139, 92, 246, 0.3);
            z-index: 1000;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            transition: width 0.3s;
        }
        
        /* 工具栏 */
        .toolbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toolbar.visible { opacity: 1; }
        
        .toolbar-btn {
            width: 40px; height: 40px;
            border: none; background: transparent;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        
        .toolbar-btn:hover { background: rgba(255,255,255,0.1); }
        
        /* 设置面板 */
        .settings-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            display: none; align-items: center; justify-content: center;
            z-index: 300;
        }
        
        .settings-modal.show { display: flex; }
        
        .settings-panel {
            background: white;
            border-radius: 16px;
            padding: 25px;
            width: 90%; max-width: 400px;
        }
        
        .settings-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        
        .settings-header h3 {
            font-size: 1.1rem; color: #333;
        }
        
        .close-btn {
            width: 32px; height: 32px;
            border: none; background: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
        }
        
        /* 加载动画 */
        .loading {
            display: flex; align-items: center; justify-content: center;
            min-height: 300px;
        }
        
        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 隐藏滚动条 */
        .page-content::-webkit-scrollbar,
        .toc-list::-webkit-scrollbar { width: 4px; }
        
        .page-content::-webkit-scrollbar-thumb,
        .toc-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 2px; }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .book-container {
                width: 95vw; height: 90vh;
            }
            .page-content {
                padding: 20px 25px;
                font-size: 16px;
            }
            .page-header { padding: 15px 25px 8px; }
            .cover-page { padding: 25px; }
            .cover-page .book-title { font-size: 1.5rem; }
        }
    </style>
</head>

            { num: 76, file: "chapter-76.md", title: "第七十六章 星的礼物" },
            { num: 77, file: "chapter-77.md", title: "第七十七章 代码之眼的终极意义" },
            { num: 78, file: "chapter-78.md", title: "第七十八章 李明哲的来信" },
            { num: 79, file: "chapter-79.md", title: "第七十九章 新的开始" },
            { num: 80, file: "chapter-80.md", title: "第八十章 代码永恒" },
        ];

        // 状态
        let currentView = 'cover'; // cover, toc, reader
        let currentChapter = 1;
        let settings = {
            fontSize: 18,
            bgColor: 'light'
        };
        let toolbarTimer = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('bookReaderSettings');
            if (saved) settings = JSON.parse(saved);
            
            const lastChapter = localStorage.getItem('lastReadChapter');
            if (lastChapter) currentChapter = parseInt(lastChapter);
            
            render();
            setupInteractions();
        });

        // 渲染
        function render() {
            const container = document.getElementById('book-container');
            container.innerHTML = '';
            
            if (currentView === 'cover') {
                renderCover(container);
            } else if (currentView === 'toc') {
                renderTOC(container);
            } else {
                renderReader(container);
            }
            
            updateSettingsUI();
        }

        // 封面
        function renderCover(container) {
            container.innerHTML = `
                <div class="cover-page">
                    <img src="cover.jpg" alt="封面" class="book-cover-img" 
                         onerror="this.style.display='none'">
                    <h1 class="book-title">全世界只剩我会古法编程</h1>
                    <p class="book-subtitle">硬核科幻 · 程序员逆袭 · 人机共存</p>
                    <p class="book-desc">
                        全球AI一夜瘫痪，所有程序员集体抓瞎。只有林渊，这个买不起AI会员的"原始人"，
                        靠手写代码成了全公司的救世主。
                    </p>
                    <button class="start-btn" onclick="startReading()">开始阅读</button>
                </div>
            `;
            document.getElementById('toolbar').classList.remove('visible');
        }

        // 目录
        function renderTOC(container) {
            const items = chapters.map(ch => `
                <div class="toc-item ${ch.num === currentChapter ? 'active' : ''}" onclick="goToChapter(${ch.num})">
                    <span class="toc-num">第${ch.num}章</span>
                    <span class="toc-title">${ch.title.replace(/^第.*?章\s*/, '')}</span>
                </div>
            `).join('');
            
            container.innerHTML = `
                <div class="toc-page">
                    <div class="toc-header">
                        <button class="toc-back-btn" onclick="showCover()">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M15 19l-7-7 7-7"/>
                            </svg>
                        </button>
                        <h2>章节目录</h2>
                    </div>
                    <div class="toc-list">${items}</div>
                </div>
            `;
            document.getElementById('toolbar').classList.remove('visible');
        }

        // 阅读器
        function renderReader(container) {
            const bgColors = {
                light: '#faf8f3',
                sepia: '#f4ecd8',
                dark: '#2d2d44'
            };
            const textColors = {
                light: '#333',
                sepia: '#5b4636',
                dark: '#e0e0e0'
            };
            
            const chapter = chapters[currentChapter - 1];
            
            container.innerHTML = `
                <div class="page" id="current-page" style="background: ${bgColors[settings.bgColor]}; color: ${textColors[settings.bgColor]}">
                    <div class="page-face" style="background: ${bgColors[settings.bgColor]}">
                        <div class="page-header">
                            <div class="page-title">${chapter.title}</div>
                        </div>
                        <div class="page-content" id="page-content" style="font-size: ${settings.fontSize}px; color: ${textColors[settings.bgColor]}">
                            <div class="loading"><div class="loading-spinner"></div></div>
                        </div>
                        <div class="page-number">- ${currentChapter} / 80 -</div>
                    </div>
                </div>
                <div class="page-zone page-zone-left" onclick="prevChapter()">
                    <div class="page-hint page-hint-left">◀</div>
                </div>
                <div class="page-zone page-zone-center" onclick="showToolbar()"></div>
                <div class="page-zone page-zone-right" onclick="nextChapter()">
                    <div class="page-hint page-hint-right">▶</div>
                </div>
            `;
            
            document.getElementById('toolbar').classList.add('visible');
            loadChapterContent();
        }

        // 加载章节内容
        async function loadChapterContent() {
            const chapter = chapters[currentChapter - 1];
            const contentEl = document.getElementById('page-content');
            
            try {
                const response = await fetch(`novel/chapters/${chapter.file}`);
                const markdown = await response.text();
                const html = marked.parse(markdown);
                contentEl.innerHTML = html;
                
                // 应用颜色
                const textColors = {
                    light: '#333',
                    sepia: '#5b4636',
                    dark: '#e0e0e0'
                };
                contentEl.style.color = textColors[settings.bgColor];
                
                // 更新进度
                document.getElementById('progress-fill').style.width = `${(currentChapter / 80) * 100}%`;
                localStorage.setItem('lastReadChapter', currentChapter);
            } catch (err) {
                contentEl.innerHTML = `<p style="text-align: center; color: #999;">加载失败，请重试</p>`;
            }
        }

        // 导航
        function startReading() {
            currentView = 'reader';
            render();
        }
        
        function showCover() {
            currentView = 'cover';
            render();
        }
        
        function showTOC() {
            currentView = 'toc';
            render();
        }
        
        function goToChapter(num) {
            currentChapter = num;
            currentView = 'reader';
            render();
        }

        // 翻页
        function prevChapter() {
            if (currentChapter > 1) {
                animatePageTurn('prev', () => {
                    currentChapter--;
                    renderReader(document.getElementById('book-container'));
                });
            }
        }
        
        function nextChapter() {
            if (currentChapter < 80) {
                animatePageTurn('next', () => {
                    currentChapter++;
                    renderReader(document.getElementById('book-container'));
                });
            }
        }

        // 翻页动画
        function animatePageTurn(direction, callback) {
            const page = document.getElementById('current-page');
            if (!page) { callback(); return; }
            
            // 简单的淡出效果
            page.style.transition = 'opacity 0.2s, transform 0.3s';
            page.style.opacity = '0.5';
            page.style.transform = direction === 'next' ? 'translateX(-20px)' : 'translateX(20px)';
            
            setTimeout(() => {
                callback();
                const newPage = document.getElementById('current-page');
                if (newPage) {
                    newPage.style.opacity = '0.5';
                    newPage.style.transform = direction === 'next' ? 'translateX(20px)' : 'translateX(-20px)';
                    setTimeout(() => {
                        newPage.style.opacity = '1';
                        newPage.style.transform = 'translateX(0)';
                    }, 50);
                }
            }, 200);
        }

        // 工具栏
        function showToolbar() {
            const toolbar = document.getElementById('toolbar');
            toolbar.classList.add('visible');
            clearTimeout(toolbarTimer);
            toolbarTimer = setTimeout(() => toolbar.classList.remove('visible'), 3000);
        }

        // 设置
        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('show');
        }
        
        function setFontSize(size) {
            settings.fontSize = size;
            localStorage.setItem('bookReaderSettings', JSON.stringify(settings));
            updateSettingsUI();
            if (currentView === 'reader') {
                document.getElementById('page-content').style.fontSize = size + 'px';
            }
        }
        
        function setBgColor(color) {
            settings.bgColor = color;
            localStorage.setItem('bookReaderSettings', JSON.stringify(settings));
            updateSettingsUI();
            if (currentView === 'reader') render();
        }
        
        function updateSettingsUI() {
            document.querySelectorAll('.font-btn').forEach(btn => {
                btn.style.borderColor = btn.textContent === getSizeLabel(settings.fontSize) ? '#8b5cf6' : '#ddd';
                btn.style.color = btn.textContent === getSizeLabel(settings.fontSize) ? '#8b5cf6' : '#333';
            });
            document.querySelectorAll('.bg-btn').forEach(btn => {
                btn.style.borderColor = btn.getAttribute('onclick').includes(settings.bgColor) ? '#8b5cf6' : 'transparent';
            });
        }
        
        function getSizeLabel(size) {
            return {14: '小', 16: '中', 18: '大', 20: '特大'}[size] || '中';
        }

        // 交互设置
        function setupInteractions() {
            // 键盘
            document.addEventListener('keydown', (e) => {
                if (currentView !== 'reader') return;
                if (e.key === 'ArrowLeft') prevChapter();
                if (e.key === 'ArrowRight' || e.key === ' ') nextChapter();
            });
            
            // 触摸滑动
            let startX = 0;
            document.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; });
            document.addEventListener('touchend', (e) => {
                if (currentView !== 'reader') return;
                const endX = e.changedTouches[0].clientX;
                const diff = startX - endX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) nextChapter();
                    else prevChapter();
                }
            });
        }
    </script>
</body>
</html>
